---

minor_changes:
  - >
    ``foundata.acmesh.run`` - Added optional per-certificate ``environment``
    key in ``run_acmesh_certs`` items. Setting environment variables per
    certificate can improve readability, as it clearly shows which certificate
    or domain is using which credentials in setups that involve multiple DNS
    provider credentials.

    Per-certificate environment variables are merged with the global
    ``run_acmesh_environment``, with per-certificate values taking precedence
    on key conflicts.

    Please note that acme.sh DNS API plugins usually persist credentials per
    provider (not per certificate) in ``account.conf``, so using different
    credentials for the same DNS provider across certificates will result in
    only the last-written set being saved for automatic renewals.
