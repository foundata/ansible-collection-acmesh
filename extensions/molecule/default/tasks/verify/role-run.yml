    - __testing_acmesh_domaincfg_stat['stat']['exists']
    - __testing_acmesh_domaincfg_content is ansible.builtin.defined


- name: "Molecule | Verify | Build list of installed certificate files"
  ansible.builtin.set_fact:
    __testing_acmesh_cert_files_installed: |
      {%- set _files = [] -%}

      {%- set _d1 = lookup('env', 'TEST_ACMESH_TESTDOMAIN1') -%}
      {%- if _d1 | ansible.builtin.length > 0 -%}
        {%- for _fname in ['ca.cer', 'cert.cer', 'fullchain.cer', 'cert.key'] -%}
          {%- set _ = _files.append('/etc/pki/tls/certs/' ~ _d1 ~ '/' ~ _fname) -%}
        {%- endfor -%}
      {%- endif -%}

      {%- set _d2 = lookup('env', 'TEST_ACMESH_TESTDOMAIN2') -%}
      {%- if _d2 | ansible.builtin.length > 0 -%}
        {%- for _fname in ['ca.cer', 'cert.cer', 'fullchain.cer', 'cert.key'] -%}
          {%- set _ = _files.append('/etc/pki/tls/certs/' ~ _d2 ~ '/' ~ _fname) -%}
        {%- endfor -%}
      {%- endif -%}

      {{ _files }}
  when:
    - (lookup('env', 'TEST_ACMESH_TESTDOMAIN1') | ansible.builtin.length > 0) or
      (lookup('env', 'TEST_ACMESH_TESTDOMAIN2') | ansible.builtin.length > 0)


- name: "Molecule | Verify | Gather stats for installed certificate files"
  ansible.builtin.stat:
    path: "{{ item }}"
    get_checksum: false
    get_mime: false
  loop: "{{ __testing_acmesh_cert_files_installed | ansible.builtin.default([]) }}"
  register: __testing_acmesh_cert_files_installed_stat
  when:
    - __testing_acmesh_cert_files_installed is ansible.builtin.defined
    - __testing_acmesh_cert_files_installed | ansible.builtin.length > 0


- name: "Molecule | Verify | Check existence, permissions and ownership: installed certificate files"
  ansible.builtin.assert:
    that:
      - item['stat']['exists']
      - item['stat']['isreg']
      - item['stat']['mode'] == '0640'
      - item['stat']['pw_name'] == run_acmesh_user
      - item['stat']['gr_name'] == run_acmesh_group
    fail_msg: "{{ item['stat']['path'] }} does not exist or has incorrect permissions/ownership"
  loop: "{{ __testing_acmesh_cert_files_installed_stat['results'] | ansible.builtin.default([]) }}"
  loop_control:
    label: "{{ item['stat']['path'] | ansible.builtin.default('undefined') }}"
  when:
    - __testing_acmesh_cert_files_installed_stat is ansible.builtin.defined
    - __testing_acmesh_cert_files_installed_stat['results'] is ansible.builtin.defined
    - __testing_acmesh_cert_files_installed_stat['results'] | ansible.builtin.length > 0


- name: "Molecule | Verify | Verify current reloadcmd and hook values in certificate config file (second domain certificate)"
  ansible.builtin.assert:
    that:
      - __testing_acmesh_domaincfg_content_decoded is search("Le_PreHook='__ACME_BASE64__START_dHJ1ZSBwcmU=__ACME_BASE64__END_'")
      - __testing_acmesh_domaincfg_content_decoded is search("Le_PostHook='__ACME_BASE64__START_dHJ1ZSBwb3N0__ACME_BASE64__END_'")
      - __testing_acmesh_domaincfg_content_decoded is search("Le_RenewHook='__ACME_BASE64__START_dHJ1ZSByZW5ldw==__ACME_BASE64__END_'")
      - __testing_acmesh_domaincfg_content_decoded is search("Le_ReloadCmd='__ACME_BASE64__START_dHJ1ZSByZWxvYWQ=__ACME_BASE64__END_'")
    fail_msg: "The certificate config file does not contain the expected reloadcmd and hook values."
    success_msg: "All reloadcmd and hook values have been found in the certificate config file."
  vars:
    __testing_acmesh_domaincfg_content_decoded: "{{ __testing_acmesh_domaincfg_content['content'] | ansible.builtin.b64decode }}"
  when:
    - (lookup('env', 'TEST_ACMESH_TESTDOMAIN2') | ansible.builtin.length) > 0
    - __testing_acmesh_domaincfg_stat['stat']['exists']
    - __testing_acmesh_domaincfg_content is ansible.builtin.defined


## Environment verification

# The per-cert environment merge feature (run_acmesh_certs[].environment)
# works at the Ansible level: per-cert values override global ones via
# ansible.builtin.combine. However, acme.sh DNS API plugins persist
# credentials per provider (not per certificate) in account.conf. Using
# different credentials for the same provider across certificates will
# result in only the last-written set being saved.
#
# The test below verifies that acme.sh has persisted the expected DNS API
# credentials in account.conf after certificate issuance.

- name: "Molecule | Verify | Read account.conf content"
  ansible.builtin.slurp:
    src: "{{ run_acmesh_cfg_config_home }}/account.conf"
  register: __testing_acmesh_account_conf_content
  when:
    - __testing_acmesh_account_conf_stat['stat']['exists']


- name: "Molecule | Verify | Display account.conf content"
  ansible.builtin.debug:
    msg: "{{ __testing_acmesh_account_conf_decoded.split('\n') }}"
    verbosity: 1
  vars:
    __testing_acmesh_account_conf_decoded: "{{ __testing_acmesh_account_conf_content['content'] | ansible.builtin.b64decode }}"
  when:
    - __testing_acmesh_account_conf_stat['stat']['exists']
    - __testing_acmesh_account_conf_content is ansible.builtin.defined


- name: "Molecule | Verify | Assert account.conf contains expected INWX credentials"
  ansible.builtin.assert:
    that:
      - __testing_acmesh_account_conf_decoded is search("SAVED_INWX_User='" ~ lookup('env', 'TEST_ACMESH_INWX_User') ~ "'")
      - __testing_acmesh_account_conf_decoded is search("SAVED_INWX_Password='" ~ lookup('env', 'TEST_ACMESH_INWX_Password') ~ "'")
    fail_msg: "account.conf does not contain the expected SAVED_INWX_User/Password values."
    success_msg: "account.conf contains the expected INWX credentials."
  vars:
    __testing_acmesh_account_conf_decoded: "{{ __testing_acmesh_account_conf_content['content'] | ansible.builtin.b64decode }}"
  when:
    - lookup('env', 'TEST_ACMESH_INWX_User') | ansible.builtin.length > 0
    - __testing_acmesh_account_conf_stat['stat']['exists']
    - __testing_acmesh_account_conf_content is ansible.builtin.defined


## Test feature: Update reloadcmd and hooks of test domain config

- name: "Molecule | Verify | Flush handlers now"
  ansible.builtin.meta: "flush_handlers"


- name: "Molecule | Verify | Adapt second domain certificate config: Update reloadcmd and hooks"
  ansible.builtin.include_role:
    name: "foundata.acmesh.run"
  vars:
    run_acmesh_state: "present"
    run_acmesh_cfg_accountemail: "{{ lookup('env', 'TEST_ACMESH_ACCOUNTEMAIL') }}"
    run_acmesh_certs:
      # The following parameters are all copied from the call in converge/run-role.yml execpt:
      # - reloadcmd
      # - pre_hook
      # - post_hook
      # - renew_hook
      - domains:
          - name: "{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}"
            challenge:
              type: "dns"
              dns_provider: "dns_inwx"
              challenge_alias: "{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2_CHALLENGE_ALIAS') }}"
          - name: "www.{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}"
            challenge:
              type: "dns"
              dns_provider: "dns_inwx"
              challenge_alias: "www.{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}.{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2_CHALLENGE_ALIAS') }}"
        install:
          ca_file: "/etc/pki/tls/certs/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}/ca.cer"
          cert_file: "/etc/pki/tls/certs/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}/cert.cer"
          fullcain_file: "/etc/pki/tls/certs/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}/fullchain.cer"
          key_file: "/etc/pki/tls/certs/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}/cert.key"
          reloadcmd: "true reload_update"
        # "{letsencrypt,buypass,google}_test" for staging, see
        # https://github.com/acmesh-official/acme.sh/wiki/Server
        server: "letsencrypt_test"
        force: false # optional
        debug: false # optional
        pre_hook: "true pre_update" # changed value
        post_hook: "true post_update" # changed value
        renew_hook: "true renew_update" # changed value
        extra_flags: "" # optional (workaround for edge cases, put --whatever here)
    # Environment variables needed for the DNS API authentication for
    # type: "dns" and dns_provider: "dns_inwx"
    run_acmesh_environment:
      INWX_User: "{{ lookup('env', 'TEST_ACMESH_INWX_User') }}"
      INWX_Password: "{{ lookup('env', 'TEST_ACMESH_INWX_Password') }}"
  when:
    - (lookup('env', 'TEST_ACMESH_TESTDOMAIN2') | ansible.builtin.length) > 0
  tags:
    - "run_acmesh_cert"


- name: "Molecule | Verify | Read certificate config file content again (second domain certificate)"
  ansible.builtin.slurp:
    src: "{{ run_acmesh_cfg_cert_home }}/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}_ecc/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}.conf"
  register: __testing_acmesh_domaincfg_content
  when:
    - (lookup('env', 'TEST_ACMESH_TESTDOMAIN2') | ansible.builtin.length) > 0
    - __testing_acmesh_domaincfg_stat['stat']['exists']


- name: "Molecule | Verify | Display certificate config file content (second domain certificate)"
  ansible.builtin.debug:
    msg: "{{ __testing_acmesh_domaincfg_content_decoded.split('\n') }}"
    verbosity: 1
  vars:
    __testing_acmesh_domaincfg_content_decoded: "{{ __testing_acmesh_domaincfg_content['content'] | ansible.builtin.b64decode }}"
  when:
    - (lookup('env', 'TEST_ACMESH_TESTDOMAIN2') | ansible.builtin.length) > 0
    - __testing_acmesh_domaincfg_stat['stat']['exists']
    - __testing_acmesh_domaincfg_content is ansible.builtin.defined


- name: "Molecule | Verify | Verify updated reloadcmd and hook values in certificate config file (second domain certificate)"
  ansible.builtin.assert:
    that:
      - __testing_acmesh_domaincfg_content_decoded is search("Le_PreHook='__ACME_BASE64__START_dHJ1ZSBwcmVfdXBkYXRl__ACME_BASE64__END_'")
      - __testing_acmesh_domaincfg_content_decoded is search("Le_PostHook='__ACME_BASE64__START_dHJ1ZSBwb3N0X3VwZGF0ZQ==__ACME_BASE64__END_'")
      - __testing_acmesh_domaincfg_content_decoded is search("Le_RenewHook='__ACME_BASE64__START_dHJ1ZSByZW5ld191cGRhdGU=__ACME_BASE64__END_'")
      - __testing_acmesh_domaincfg_content_decoded is search("Le_ReloadCmd='__ACME_BASE64__START_dHJ1ZSByZWxvYWRfdXBkYXRl__ACME_BASE64__END_'")
    fail_msg: "The certificate config file does not contain the expected, updated reloadcmd and hook values."
    success_msg: "All updated reloadcmd and hook values have been found in the certificate config file."
  vars:
    __testing_acmesh_domaincfg_content_decoded: "{{ __testing_acmesh_domaincfg_content['content'] | ansible.builtin.b64decode }}"
  when:
    - (lookup('env', 'TEST_ACMESH_TESTDOMAIN2') | ansible.builtin.length) > 0
    - __testing_acmesh_domaincfg_stat['stat']['exists']
    - __testing_acmesh_domaincfg_content is ansible.builtin.defined


## Test uninstall: additional, non-primary group removal (no additional members)

- name: "Molecule | Verify | Flush handlers now"
  ansible.builtin.meta: "flush_handlers"


- name: "Molecule | Verify | Include the foundata.acmesh.run role (with additional, non-primary group)"
  ansible.builtin.include_role:
    name: "foundata.acmesh.run"
  vars:
    run_acmesh_state: "present"
    run_acmesh_group: "acmesh-foobar"


- name: "Molecule | Verify | Query user existence after install: {{ run_acmesh_user }}"
  ansible.builtin.getent:
    database: "passwd"
    key: "{{ run_acmesh_user }}"
    fail_key: false


- name: "Molecule | Verify | Query group existence after install: acmesh-foobar"
  ansible.builtin.getent:
    database: "group"
    key: "acmesh-foobar"
    fail_key: false


- name: "Molecule | Verify | Assert user and group exist after install"
  ansible.builtin.assert:
    that:
      - ansible_facts['getent_passwd'][run_acmesh_user] is not none
      - ansible_facts['getent_group']['acmesh-foobar'] is not none
    fail_msg: "User {{ run_acmesh_user }} or group acmesh-foobar does not exist after install"


- name: "Molecule | Verify | Include the foundata.acmesh.run role (uninstall with additional, non-primary group)"
  ansible.builtin.include_role:
    name: "foundata.acmesh.run"
  vars:
    run_acmesh_state: "absent"
    run_acmesh_group: "acmesh-foobar"


- name: "Molecule | Verify | Query user existence after uninstall: {{ run_acmesh_user }}"
  ansible.builtin.getent:
    database: "passwd"
    key: "{{ run_acmesh_user }}"
    fail_key: false


- name: "Molecule | Verify | Query group existence after uninstall: acmesh-foobar"
  ansible.builtin.getent:
