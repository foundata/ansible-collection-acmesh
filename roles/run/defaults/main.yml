# Default variables and values for this role.
#
# These variables are designed to be easily overridden (as they have a low
# precedence) and typically allow users to customize the role's behavior.
# Each variable should have a clear comment above it, describing its purpose
# and how it fits into the role's functionality.

---


# Determines whether the managed resources should be `present` or `absent`.
#
# `present` ensures that required components, such as software packages, are
# installed and configured.
#
# `absent` reverts changes as much as possible, such as removing packages,
# deleting created users, stopping services, restoring modified settings, …
#
# - Type: str
# - Required: No
# - Default: present
# - Choices: present, absent
run_acmesh_state: "present"

# If set to `true`, all managed packages will be upgraded during each Ansible
# run (e.g., when the package provider detects a newer version than the
# currently installed one).
#
# - Type: bool
# - Required: No
# - Default: false
run_acmesh_autoupgrade: false

# Enables daily automatic certificate renewal via systemd timer (this role is
# not using acme.sh's cronjob function).
#
# - Type: bool
# - Required: No
# - Default: true
run_acmesh_autorenewal: true

# Defines environment variables required for ACME DNS challenges.
#
# This is typically needed for DNS challenge plugins, such as those requiring
# DNS API credentials (e.g., `HETZNER_Token`, `INWX_User`, `INWX_Password`).
# Multiple variables can be defined in parallel to support different providers
# for different domains on the same server. For more details on acme.sh's DNS
# API support see https://github.com/acmesh-official/acme.sh/wiki/dnsapi
#
# Example:
#
# ```
# run_acmesh_environment:
#   "HETZNER_Token": "\{\{ lookup('ansible.builtin.unvault', '...') | ansible.builtin.string | ansible.builtin.trim \}\}"
# ```
#
# - Type: dict
# - Required: No
# - Default: {}
run_acmesh_environment: {}

# The Git repository URL for acme.sh. The role uses this URL to clone the source
# code during installation or updates and to query available version tags via
# `git ls-remote`.
#
# Can be set to an internal Git mirror for air-gapped environments or to avoid
# GitHub API rate limits.
#
# - Type: str
# - Required: No
# - Default: https://github.com/acmesh-official/acme.sh.git
run_acmesh_git_url: "https://github.com/acmesh-official/acme.sh.git"

# The Git branch to clone when no version tag could be determined from the
# remote repository (e.g. because `git ls-remote` failed or returned no matching
# tags).
#
# See https://github.com/acmesh-official/acme.sh/issues/1162 for why acme.sh
# uses `master` as the branch for the latest release.
#
# - Type: str
# - Required: No
# - Default: master
run_acmesh_git_fallback_version_branch: "master"

# Overrides the automatically detected acme.sh version with a specific Git ref
# (tag, branch, or commit hash). When set (non-empty string), the role skips the
# upstream version tag detection via `git ls-remote` and uses this value
# directly for the `git clone` operation.
#
# This is useful when the latest tagged release does not yet include a feature
# you need (setting to `master` is usually safe as acme.sh aims for a
# production-ready `master` branch by default), or when you want to pin a
# specific version for reproducibility.
#
# When set, the upgrade task also respects this value and skips the normal
# semver comparison that gates upgrades.
#
# - Type: str
# - Required: No
# - Default:
run_acmesh_git_version: ""

# Defines certificates to be requested, their associated domains, challenge
# methods, and installation details. Each item in the list is a dictionary with
# suboptions / keys.
#
# Example:
#
# ```
# run_acmesh_certs:
#   # first certificate: "example.org"
#   - domains:
#       - name: "example.org"
#         challenge: # parameters depend on type
#           type: "webroot"
#           webroot: "/var/www/example.org"
#     install:
#       ca_file: "/etc/pki/tls/certs/example.org/ca.cer"
#       cert_file: "/etc/pki/tls/certs/example.org/cert.cer"
#       fullchain_file: "/etc/pki/tls/certs/example.org/fullchain.cer"
#       key_file: "/etc/pki/tls/certs/example.org/cert.key"
#       reloadcmd: "systemctl reload apache2.service;"
#   # second certificate: "foo.example.com" with an additional "bar.example.com" SAN
#   - domains:
#       - name: "foo.example.com"
#         challenge: # parameters depend on type
#           type: "dns"
#           dns_provider: "dns_hetzner"
#           challenge_alias: "foo.example.com.example.net"
#       - name: "bar.example.com"
#         challenge:
#           type: "dns"
#           dns_provider: "dns_inwx"
#           challenge_alias: "bar.example.com.example.net"
#     install:
#       ca_file: "/etc/pki/tls/certs/foo.example.com/ca.cer"
#       cert_file: "/etc/pki/tls/certs/foo.example.com/cert.cer"
#       fullchain_file: "/etc/pki/tls/certs/foo.example.com/fullchain.cer"
#       key_file: "/etc/pki/tls/certs/foo.example.com/cert.key"
#       reloadcmd: "systemctl reload nginx.service; systemctl restart postfix.service"
#     # optional, CA alias or URL, defaults to "letsencrypt". "{letsencrypt,buypass,google}_test"
#     # for staging, see https://github.com/acmesh-official/acme.sh/wiki/Server for details.
#     server: "zerossl"
#     force: false  # optional
#     debug: false # optional
#     post_hook: ""  # optional
#     renew_hook: "" # optional
#     extra_flags: "" # optional (workaround for edge cases, put --whatever in here, used during issuing a cert")
#
# # Environment variables needed for the DNS API authentication for
# # type: "dns" and dns_provider: "dns_hetzner" /  dns_provider: "dns_inwx"
# run_acmesh_environment:
#   HETZNER_Token: "\{\{ lookup('ansible.builtin.unvault', '...') | ansible.builtin.string | ansible.builtin.trim \}\}"
#   INWX_User: "exampleuser"
#   INWX_Password: "\{\{ lookup('ansible.builtin.unvault', '...') | ansible.builtin.string | ansible.builtin.trim \}\}"
# ```
#
# - Type: list
# - Required: No
# - Default: []
# - List elements: dict
run_acmesh_certs: []

# Specifies the service user account that runs acme.sh and owns relevant files
# and directories.
#
# - Type: str
# - Required: No
# - Default: acmesh
run_acmesh_user: "acmesh"

# Specifies the group associated with the service user for managing acme.sh and
# the corresponding file permissions.
#
# - Type: str
# - Required: No
# - Default: acmesh
run_acmesh_group: "acmesh"

# Specifies the email address to be associated with the ACME account. This email
# is used for expiration notices and recovery purposes. Some ACME providers
# might refuse to issue certificates if not set.
#
# - Type: str
# - Required: No
# - Default:
run_acmesh_cfg_accountemail: ""

# Specifies the installation directory for the acme.sh software (relates to
# acme.sh option --home). Will also be used as home directory of the service
# user defined (see `run_acmesh_user`).
#
# - Type: str
# - Required: No
# - Default: /opt/acme.sh
run_acmesh_cfg_home: "/opt/acme.sh"

# Defines where configuration files are stored (relates to acme.sh option
# --config-home).
#
# - Type: str
# - Required: No
# - Default: /etc/acme.sh
run_acmesh_cfg_config_home: "/etc/acme.sh"

# Specifies the directory where certificates are maintained by acme.sh (relates
# to acme.sh option --certhome). ⚠️ Do not rely on the files in this directory
# directly. Instead, copy the certificates where needed using the "install" key
# of `run_acmesh_certs` (relates to acme.sh option --install-cert). This ensures
# that the certificates are properly maintained and automatically reinstalled
# upon renewal. See the following for more information:
# https://github.com/acmesh-official/acme.sh/issues/2350#issuecomment-1449235599
#
# - Type: str
# - Required: No
# - Default: /var/opt/acme.sh
run_acmesh_cfg_cert_home: "/var/opt/acme.sh"

# Path to the log file where acme.sh logs its operations (relates to acme.sh
# option --log).
#
# - Type: str
# - Required: No
# - Default: /var/log/acme.sh.log
run_acmesh_cfg_logfile: "/var/log/acme.sh.log"

# Specifies the log level (relates to acme.sh option --log-level). Possible
# values are 1 (less logging) and 2 (more logging).
#
# - Type: int
# - Required: No
# - Default: 1
# - Choices: 1, 2
run_acmesh_cfg_log_level: 1

# Specifies what to log (relates to acme.sh option --syslog). Possible values
# are 0 (disable syslog), 3 (errors), 6 (info) and 7 (debug)
#
# - Type: int
# - Required: No
# - Default: 3
# - Choices: 0, 3, 6, 7
run_acmesh_cfg_syslog: 3

# Path to a custom CA certificate bundle file on the remote host. Passed as
# `--ca-bundle` to all acme.sh commands that make HTTPS requests (issue,
# register-account). Needed when the ACME server uses a certificate signed by a
# private or non-standard CA (e.g., a local pebble test server).
#
# This is a global acme.sh setting -- acme.sh persists it to its `account.conf`
# and applies it to all operations including cron renewals.
#
# - Type: str
# - Required: No
# - Default:
run_acmesh_cfg_ca_bundle: ""

# Path to a directory of CA certificates in PEM format on the remote host.
# Passed as `--ca-path` to all acme.sh commands that make HTTPS requests.
# Alternative to `run_acmesh_cfg_ca_bundle` when the HTTP client (curl/wget)
# requires a directory of individual CA certificate files.
#
# This is a global acme.sh setting -- acme.sh persists it to its `account.conf`
# and applies it to all operations including cron renewals.
#
# - Type: str
# - Required: No
# - Default:
run_acmesh_cfg_ca_path: ""

# List of ACME account keys to pre-seed. This is useful for `dns-persist-01`
# challenges where the TXT record is bound to a specific account key, and you
# want to reuse the same key across multiple servers or after re-installations.
#
# Each item must specify a `server` (CA alias or URL, same value used in
# `run_acmesh_certs[].server`) and `account_key` (PEM-encoded private key
# content). The role seeds the key and then runs `acme.sh --register-account`
# which confirms the account with the CA and may generate the `account.json`
# metadata automatically if needed (per RFC 8555 section 7.3.1, the CA
# identifies accounts by their public key).
#
# Example:
#
# ```
# run_acmesh_cfg_account_keys:
#   - server: "letsencrypt"
#     account_key: "\{\{ lookup('ansible.builtin.unvault', 'files/acmesh_account_key_letsencrypt.pem') \}\}"
# ```
#
# - Type: list
# - Required: No
# - Default: []
# - List elements: dict
run_acmesh_cfg_account_keys: []

# Controls the pause duration (in seconds) after displaying dns-persist-01 TXT
# record instructions. Set to `0` to disable the pause (useful for CI/CD
# pipelines or environments where TXT records are guaranteed to already be
# published).
#
# If the pause expires without user confirmation, the play continues.
#
# - Type: int
# - Required: No
# - Default: 600
run_acmesh_dns_persist_pause: 600
