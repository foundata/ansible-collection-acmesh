---
ancestor: null
releases:
  1.5.1:
    changes:
      bugfixes:
        - '``foundata.acmesh.run`` - The ``webroot`` challenge parameter was missing
          from the role''s argument spec (``meta/argument_specs.yml``), causing validation
          failures when using ``type: webroot`` in ``run_acmesh_certs[].domains[].challenge``.
          The ``domain_alias`` description was also corrected to accurately describe
          DNS alias mode (see `#15 <https://github.com/foundata/ansible-collection-acmesh/issues/15>`__).

          '
      minor_changes:
        - 'Added Molecule tests for webroot (HTTP-01) challenge certificate issuance
          using `pebble <https://github.com/letsencrypt/pebble>`__ (Let''s Encrypt
          test ACME server). The tests run unconditionally on all platforms (no external
          credentials required) with a switchable web server backend (nginx or apache,
          controlled via the ``TEST_ACMESH_WEBROOT_BACKEND`` environment variable,
          defaulting to nginx).

          '
      release_summary: 'Release Date: 2026-05-10


        Bugfix release.

        '
    fragments:
      - 1.5.1-release.yaml
      - issue-15-fix-webroot.yaml
    release_date: '2026-05-10'
  1.5.0:
    changes:
      bugfixes:
        - '``foundata.acmesh.run`` - Fixed handler failure during uninstall by skipping
          the ownership and permissions handler when ``run_acmesh_cfg_home`` no longer
          exists.

          '
        - '``foundata.acmesh.run`` - Fixed incorrect group ownership on renewed certificate
          files by setting the SGID bit (``2750``) on certificate directories. Without
          it, files created by acme.sh during automatic renewal via the systemd timer
          were owned by the service user''s primary group instead of ``run_acmesh_group``,
          which could not be corrected without an additional Ansible run.

          '
      minor_changes:
        - '``foundata.acmesh.run`` - Added optional per-certificate ``environment``
          key in ``run_acmesh_certs`` items. Setting environment variables per certificate
          can improve readability, as it clearly shows which certificate or domain
          is using which credentials in setups that involve multiple DNS provider
          credentials.

          Per-certificate environment variables are merged with the global ``run_acmesh_environment``,
          with per-certificate values taking precedence on key conflicts.

          Please note that acme.sh DNS API plugins usually persist credentials per
          provider (not per certificate) in ``account.conf``, so using different credentials
          for the same DNS provider across certificates will result in only the last-written
          set being saved for automatic renewals.

          '
        - '``foundata.acmesh.run`` - The uninstall tasks now check ``run_acmesh_group``
          membership and delete the supplementary group if no other members remain.

          '
      release_summary: 'Release Date: 2026-02-21


        Feature and bugfix release.

        '
    fragments:
      - 1.5.0-release.yaml
      - add-per-cert-environment.yaml
      - fix-cert-dir-sgid-group-inheritance.yaml
      - fix-handler-exec-on-uninstall.yaml
      - uninstall-delete-empty-supplementary-group.yaml
    release_date: '2026-02-21'
  1.4.0:
    changes:
      minor_changes:
        - 'Molecule: Added openSUSE Leap 16.0 as a test target platform.

          '
        - '``foundata.acmesh.run`` - Added ``run_acmesh_git_fallback_version_branch``
          parameter to configure the Git branch used as a fallback when no version
          tag can be determined from the remote repository.

          '
        - '``foundata.acmesh.run`` - Added ``run_acmesh_git_url`` parameter to override
          the Git repository URL used for cloning acme.sh and querying upstream version
          tags. This allows pointing the role at an internal Git mirror, making it
          suitable for air-gapped environments and avoiding GitHub API rate limits.

          '
        - '``foundata.acmesh.run`` - Replaced the GitHub API-based version detection
          with ``git ls-remote --tags --refs``. This approach works with any Git remote
          and no longer requires access to the GitHub API.

          '
        - '``foundata.acmesh.run``: Added openSUSE Leap 16.0 as a supported platform.

          '
      release_summary: 'Release Date: 2026-02-20


        Feature release.

        '
      removed_features:
        - 'Molecule: Removed openSUSE Leap 15.6 as a test target platform.

          '
        - '``foundata.acmesh.run``: Removed openSUSE Leap 15.6 from the list of supported
          platforms. The role will continue to work on openSUSE Leap 15.6 but will
          display a warning. To avoid this, either remain on or pin the previous version
          of the collection. Bugs and issues related to openSUSE Leap 15.6 will no
          longer be fixed.

          '
    fragments:
      - 1.4.0-release.yaml
      - add-git-url-fallback-branch-params.yaml
      - platform-add-opensuseleap160-remove-opensuseleap156.yaml
    release_date: '2026-02-20'
  1.3.0:
