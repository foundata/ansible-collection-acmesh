## systemd service / timer

- name: "Molecule | Verify | Gather service facts"
  ansible.builtin.service_facts:


- name: "Molecule | Verify | Check acmesh-renewal.service is existing, static status"
  ansible.builtin.assert:
    that:
      - "'acmesh-renewal.service' in ansible_facts['services']"
      - ansible_facts['services']['acmesh-renewal.service']['status'] in ['static']
    fail_msg: "acmesh-renewal.service is not existing as expected or wrong status"


- name: "Molecule | Verify | Get acmesh-renewal.timer properties"
  ansible.builtin.systemd:
    name: "acmesh-renewal.timer"
  failed_when:
    - false
  register: __testing_acmesh_timer_result


- name: "Molecule | Verify | Assert acmesh-renewal.timer configuration looks correct"
  ansible.builtin.assert:
    that:
      - __testing_acmesh_timer_result['status']['LoadState'] == 'loaded'
      - __testing_acmesh_timer_result['status']['UnitFileState'] == 'enabled'
      - __testing_acmesh_timer_result['status']['ActiveState'] == 'active'
      - __testing_acmesh_timer_result['status']['Triggers'] == 'acmesh-renewal.service'
      - __testing_acmesh_timer_result['status']['Unit'] == 'acmesh-renewal.service'
      - "'timers.target' in __testing_acmesh_timer_result['status']['WantedBy']"
    fail_msg: "acmesh-renewal.timer does not have the expected configuration"


- name: "Molecule | Verify | Get acmesh-renewal.service properties"
  ansible.builtin.systemd:
    name: "acmesh-renewal.service"
  failed_when:
    - false
  register: __testing_acmesh_service_result


- name: "Molecule | Verify | Assert acmesh-renewal.service configuration looks correct"
  ansible.builtin.assert:
    that:
      - __testing_acmesh_service_result['status']['Type'] == 'oneshot'
      - __testing_acmesh_service_result['status']['User'] == run_acmesh_user
      - __testing_acmesh_service_result['status']['Group'] == run_acmesh_group
      - __testing_acmesh_service_result['status']['WorkingDirectory'] == run_acmesh_cfg_home
      - (run_acmesh_cfg_home ~ '/acme.sh') in __testing_acmesh_service_result['status']['ExecStart']
    fail_msg: "acmesh-renewal.service does not have the expected configuration"


## Files and directories: certificates of test domains (dns-01 challenge)

- name: "Molecule | Verify | Certificates (dns-01 challenge, first test domain)"
  when:
    - __testing_missing_envvars_dns01 is not ansible.builtin.defined or
      ((__testing_missing_envvars_dns01 | ansible.builtin.length) <= 0)
    - (lookup('env', 'TEST_ACMESH_TESTDOMAIN1') | ansible.builtin.length) > 0
  block:

    - name: "Molecule | Verify | Gather stats for directory: certificate data dir (dns-01 challenge, first test domain)"
      ansible.builtin.stat:
        path: "{{ run_acmesh_cfg_cert_home }}/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN1') }}_ecc/"
        get_checksum: false
        get_mime: false
      register: __testing_acmesh_testdomain1_certdir_stat


    - name: "Molecule | Verify | Check existence, permissions and ownership: certificate data dir (dns-01 challenge, first test domain)"
      ansible.builtin.assert:
        that:
          - __testing_acmesh_testdomain1_certdir_stat['stat']['exists']
          - __testing_acmesh_testdomain1_certdir_stat['stat']['isdir']
          - __testing_acmesh_testdomain1_certdir_stat['stat']['mode'] == '2750'
          - __testing_acmesh_testdomain1_certdir_stat['stat']['pw_name'] == run_acmesh_user
          - __testing_acmesh_testdomain1_certdir_stat['stat']['gr_name'] == run_acmesh_group
        fail_msg: "{{ run_acmesh_cfg_cert_home }}/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN1') }}_ecc/ does not exist or has incorrect permissions/ownership"


    - name: "Molecule | Verify | Check certificate config file existence (dns-01 challenge, first test domain)"
      ansible.builtin.stat:
        path: "{{ run_acmesh_cfg_cert_home }}/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN1') }}_ecc/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN1') }}.conf"
        get_checksum: false
        get_mime: false
      register: __testing_acmesh_domaincfg_stat_domain1


    - name: "Molecule | Verify | Read certificate config file content (dns-01 challenge, first test domain)"
      ansible.builtin.slurp:
        src: "{{ run_acmesh_cfg_cert_home }}/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN1') }}_ecc/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN1') }}.conf"
      register: __testing_acmesh_domaincfg_content_domain1
      when:
        - __testing_acmesh_domaincfg_stat_domain1 is ansible.builtin.defined
        - __testing_acmesh_domaincfg_stat_domain1['stat']['exists']


    - name: "Molecule | Verify | Display certificate config file content (dns-01 challenge, first test domain)"
      ansible.builtin.debug:
        msg: "{{ __testing_acmesh_domaincfg_content_domain1_decoded.split('\n') }}"
        verbosity: 1
      vars:
        __testing_acmesh_domaincfg_content_domain1_decoded: "{{ __testing_acmesh_domaincfg_content_domain1['content'] | ansible.builtin.b64decode }}"
      when:
        - __testing_acmesh_domaincfg_stat_domain1 is ansible.builtin.defined
        - __testing_acmesh_domaincfg_stat_domain1['stat']['exists']
        - __testing_acmesh_domaincfg_content_domain1 is ansible.builtin.defined


