# Execute the collection role "run" against all driver-created instances.

- name: "Molecule | Converge | Store run_acmesh_* role parameters in __testing_state"
  ansible.builtin.include_tasks:
    file: "../tasks/state_update.yml"
  vars:
    __testing_state_update:
      run_acmesh_state: "present"


- name: "Molecule | Converge | Check for environment variables needed to issue certificates via DNS challenge"
  ansible.builtin.set_fact:
    __testing_missing_envvars_dnschallenge: "{{ __testing_missing_envvars_dnschallenge | ansible.builtin.default([]) + [item] }}"
  when:
    - lookup('env', item, default='') == ''
  loop:
    - "TEST_ACMESH_ACCOUNTEMAIL"
    - "TEST_ACMESH_TESTDOMAIN1"
    - "TEST_ACMESH_TESTDOMAIN1_DOMAIN_ALIAS"
    - "TEST_ACMESH_TESTDOMAIN2"
    - "TEST_ACMESH_TESTDOMAIN2_CHALLENGE_ALIAS"
    - "TEST_ACMESH_INWX_User"
    - "TEST_ACMESH_INWX_Password"


- name: "Molecule | Converge | Show missing environment variables (if any) needed to issue certificates via DNS challenge"
  ansible.builtin.debug:
    msg: >
      Tests regarding certificate issuing via DNS challenge will be skipped,
      required environment variables are missing or invalid: {{ __testing_missing_envvars_dnschallenge | join(', ') }}.
  when:
    - __testing_missing_envvars_dnschallenge is ansible.builtin.defined
    - __testing_missing_envvars_dnschallenge | ansible.builtin.length > 0


- name: "Molecule | Converge | Store run_acmesh_* role parameters needed for certificate issuance in __testing_state"
  ansible.builtin.include_tasks:
    file: "../tasks/state_update.yml"
  vars:
    __testing_state_update:
      run_acmesh_git_version: "master" # test against the latest upstream
      run_acmesh_cfg_accountemail: "{{ lookup('env', 'TEST_ACMESH_ACCOUNTEMAIL') }}"
      run_acmesh_certs:
        # first certificate: main domain only
        - domains:
            - name: "{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN1') }}"
              challenge:
                type: "dns"
                dns_provider: "dns_inwx"
                domain_alias: "{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN1_DOMAIN_ALIAS') }}"
          install:
            ca_file: "/etc/pki/tls/certs/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN1') }}/ca.cer"
            cert_file: "/etc/pki/tls/certs/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN1') }}/cert.cer"
            fullchain_file: "/etc/pki/tls/certs/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN1') }}/fullchain.cer"
            key_file: "/etc/pki/tls/certs/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN1') }}/cert.key"
            reloadcmd: ""
          # "{letsencrypt,buypass,google}_test" for staging, see
          # https://github.com/acmesh-official/acme.sh/wiki/Server
          server: "letsencrypt_test"
          force: false # optional
          debug: false # optional

        # second certificate: main domain with an additional www. SAN
        - domains:
            - name: "{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}"
              challenge:
                type: "dns"
                dns_provider: "dns_inwx"
                challenge_alias: "{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2_CHALLENGE_ALIAS') }}"
            - name: "www.{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}"
              challenge:
                type: "dns"
                dns_provider: "dns_inwx"
                challenge_alias: "www.{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}.{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2_CHALLENGE_ALIAS') }}"
          install:
            ca_file: "/etc/pki/tls/certs/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}/ca.cer"
            cert_file: "/etc/pki/tls/certs/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}/cert.cer"
            fullchain_file: "/etc/pki/tls/certs/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}/fullchain.cer"
            key_file: "/etc/pki/tls/certs/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}/cert.key"
            reloadcmd: "true reload"
          # "{letsencrypt,buypass,google}_test" for staging, see
          # https://github.com/acmesh-official/acme.sh/wiki/Server
          server: "letsencrypt_test"
          force: false # optional
          debug: false # optional
          pre_hook: "true pre" # optional; using a dummy command here to later check if value updating works
          post_hook: "true post" # optional; using a dummy command here to later check if value updating works
          renew_hook: "true renew" # optional; using a dummy command here to later check if value updating works
          extra_flags: "" # optional (workaround for edge cases, put --whatever here)

      # Environment variables needed for the DNS API authentication for
      # type: "dns" and dns_provider: "dns_inwx"
      run_acmesh_environment:
        INWX_User: "{{ lookup('env', 'TEST_ACMESH_INWX_User') }}"
        INWX_Password: "{{ lookup('env', 'TEST_ACMESH_INWX_Password') }}"
  when:
    - __testing_missing_envvars_dnschallenge is not ansible.builtin.defined or
      ((__testing_missing_envvars_dnschallenge | ansible.builtin.length) <= 0)


## dns-persist-01 certificate (requires permanent TXT records + pre-seeded account key)
#
# Prerequisites (one-time, manual setup):
#
# 1. Generate an ACME account key and register it with the staging CA:
#    ./acme.sh --register-account -m "${TEST_ACMESH_ACCOUNTEMAIL}" --server letsencrypt_test
#
# 2. Generate the dns-persist TXT record value for each test domain:
#    ./acme.sh --make-dns-persist-value -d "${TEST_ACMESH_TESTDOMAIN3}" --server letsencrypt_test
#
# 3. Publish permanent TXT records in DNS:
#    _validation-persist.${TEST_ACMESH_TESTDOMAIN3} -> <value from step 2>
#
# 4. Export the account key content as TEST_ACMESH_ACCOUNT_KEY environment
#    variable (PEM-encoded, including BEGIN/END markers):
#      export TEST_ACMESH_ACCOUNT_KEY="$(< ~/.acme.sh/ca/acme-staging-v02.api.letsencrypt.org/directory/account.key)"
#    Optionally also export TEST_ACMESH_ACCOUNT_JSON with the account.json
#    content:
#      export TEST_ACMESH_ACCOUNT_JSON="$(< ~/.acme.sh/ca/acme-staging-v02.api.letsencrypt.org/directory/account.json)"
#
# These records are permanent and only need to be re-published if the account
# key changes. Multiple TXT RRs at the same name are valid DNS.

- name: "Molecule | Converge | Check for environment variables needed for dns-persist-01 challenge"
  ansible.builtin.set_fact:
    __testing_missing_envvars_dnspersist: "{{ __testing_missing_envvars_dnspersist | ansible.builtin.default([]) + [item] }}"
  when:
    - lookup('env', item, default='') == ''
  loop:
    - "TEST_ACMESH_ACCOUNTEMAIL"
    - "TEST_ACMESH_TESTDOMAIN3"
    - "TEST_ACMESH_ACCOUNT_KEY"


- name: "Molecule | Converge | Show missing environment variables (if any) needed for dns-persist-01 challenge"
  ansible.builtin.debug:
    msg: >
      Tests regarding certificate issuing via dns-persist-01 challenge will be
      skipped, required environment variables are missing or invalid: {{ __testing_missing_envvars_dnspersist | join(', ') }}.
  when:
    - __testing_missing_envvars_dnspersist is ansible.builtin.defined
    - __testing_missing_envvars_dnspersist | ansible.builtin.length > 0


- name: "Molecule | Converge | Append dns-persist-01 certificate config and account key to __testing_state"
  ansible.builtin.include_tasks:
    file: "../tasks/state_update.yml"
  vars:
    __testing_state_update:
      run_acmesh_dns_persist_pause: 0
      run_acmesh_cfg_account_keys:
        - server: "letsencrypt_test"
          account_key: "{{ lookup('env', 'TEST_ACMESH_ACCOUNT_KEY') }}"
      run_acmesh_certs: >-
        {{
          (__testing_state['run_acmesh_certs'] | ansible.builtin.default([], true))
          +
          [{
            'domains': [{
              'name': lookup('env', 'TEST_ACMESH_TESTDOMAIN3'),
              'challenge': {
                'type': 'dns_persist'
              }
            }],
            'install': {
              'ca_file': '/etc/pki/tls/certs/' ~ lookup('env', 'TEST_ACMESH_TESTDOMAIN3') ~ '/ca.cer',
              'cert_file': '/etc/pki/tls/certs/' ~ lookup('env', 'TEST_ACMESH_TESTDOMAIN3') ~ '/cert.cer',
              'fullchain_file': '/etc/pki/tls/certs/' ~ lookup('env', 'TEST_ACMESH_TESTDOMAIN3') ~ '/fullchain.cer',
              'key_file': '/etc/pki/tls/certs/' ~ lookup('env', 'TEST_ACMESH_TESTDOMAIN3') ~ '/cert.key',
              'reloadcmd': ''
            },
            'server': 'letsencrypt_test',
            'force': false,
            'debug': false
          }]
        }}
  when:
    - __testing_missing_envvars_dnspersist is not ansible.builtin.defined or
      ((__testing_missing_envvars_dnspersist | ansible.builtin.length) <= 0)


## Webroot certificate via pebble (runs unconditionally when pebble is available)

- name: "Molecule | Converge | Set default account email for pebble if not already configured"
  ansible.builtin.include_tasks:
    file: "../tasks/state_update.yml"
  vars:
    __testing_state_update:
      run_acmesh_cfg_accountemail: "test@acmesh-webroot.test"
  when:
    - __testing_state['__testing_pebble_available'] | ansible.builtin.default(false)
    - __testing_state['run_acmesh_cfg_accountemail'] is not ansible.builtin.defined or
      (__testing_state['run_acmesh_cfg_accountemail'] | ansible.builtin.length) <= 0


- name: "Molecule | Converge | Append webroot (pebble) certificate config to run_acmesh_certs"
  ansible.builtin.include_tasks:
    file: "../tasks/state_update.yml"
  vars:
    __testing_state_update:
      run_acmesh_certs: >-
        {{
          (__testing_state['run_acmesh_certs'] | ansible.builtin.default([], true))
          +
          [{
            'domains': [{
              'name': 'acmesh-webroot.test',
              'challenge': {
                'type': 'webroot',
                'webroot': '/var/www/acmesh-test'
              }
            }],
            'install': {
              'ca_file': '/etc/pki/tls/certs/acmesh-webroot.test/ca.cer',
              'cert_file': '/etc/pki/tls/certs/acmesh-webroot.test/cert.cer',
              'fullchain_file': '/etc/pki/tls/certs/acmesh-webroot.test/fullchain.cer',
              'key_file': '/etc/pki/tls/certs/acmesh-webroot.test/cert.key',
              'reloadcmd': ''
            },
            'server': 'https://localhost:14000/dir'
          }]
        }}
  when:
    - __testing_state['__testing_pebble_available'] | ansible.builtin.default(false)
    - >-
      'acmesh-webroot.test' not in
      (
        (__testing_state['run_acmesh_certs'] | ansible.builtin.default([]))
        | map(attribute='domains', default=[])
        | flatten
        | map(attribute='name', default='')
        | list
      )


- name: "Molecule | Converge | Set run_acmesh_* parameters as facts from __testing_state"
  ansible.builtin.set_fact:
    "{{ item['key'] }}": "{{ item['value'] }}"
  loop: >-
    {{
      (__testing_state | default({}, true))
      | ansible.builtin.dict2items
      | ansible.builtin.selectattr('key', 'match', '^run_acmesh_')
      | ansible.builtin.list
    }}

- name: "Molecule | Converge | Include the foundata.acmesh.run role"
  ansible.builtin.include_role:
    name: "foundata.acmesh.run"
  # vars: All run_acmesh_* variables are set as facts and passed this way to
  #       the role. This enables persisting the values in __testing_state
  #       and restoring them in later stages (e.g. verify) without manually
  #       duplicating data across playbooks.
