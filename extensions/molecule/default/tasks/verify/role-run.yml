# The per-cert environment merge feature (run_acmesh_certs[].environment) works
# at the Ansible level: per-cert values override global ones via
# ansible.builtin.combine. However, acme.sh DNS API plugins persist credentials
# per provider (not per certificate) in account.conf. Using different credentials
# for the same provider across certificates will result in only the last-written
# set being saved.
#
# The test below verifies that acme.sh has persisted the expected DNS API
# credentials in account.conf after certificate issuance.

- name: "Molecule | Verify | Read account.conf content"
  ansible.builtin.slurp:
    src: "{{ run_acmesh_cfg_config_home }}/account.conf"
  register: __testing_acmesh_account_conf_content
  when:
    - __testing_acmesh_account_conf_stat['stat']['exists']


- name: "Molecule | Verify | Display account.conf content"
  ansible.builtin.debug:
    msg: "{{ __testing_acmesh_account_conf_decoded.split('\n') }}"
    verbosity: 1
  vars:
    __testing_acmesh_account_conf_decoded: "{{ __testing_acmesh_account_conf_content['content'] | ansible.builtin.b64decode }}"
  when:
    - __testing_acmesh_account_conf_stat['stat']['exists']
    - __testing_acmesh_account_conf_content is ansible.builtin.defined


# When both dns-01 (TEST_ACMESH_TESTDOMAIN1/2 via INWX) and dns-persist-01
# (TEST_ACMESH_TESTDOMAIN3 via TEST_ACMESH_ACCOUNT_KEY) tests are active
# simultaneously, the SAVED_INWX_* credential check must be skipped.
#
# Root cause: run_acmesh_cfg_account_keys pre-seeds a fixed ACME account key
# for the letsencrypt_test CA server. Both dns-01 and dns-persist certificates
# share this CA. After the first successful molecule run, the CA caches domain
# authorizations (~30 days) for that account key. On subsequent runs (fresh
# containers, same key), acme.sh finds valid cached authorizations and skips
# the DNS challenge entirely (acme.sh issue(), authorization "status":"valid"
# -> keyauthorization="$STATE_VERIFIED" -> continue). Since the dns_inwx plugin
# never executes, _saveaccountconf_mutable is never called and SAVED_INWX_*
# entries are never written to the fresh container's account.conf.
#
# This is a test-only limitation, not a production issue: in production,
# account.conf persists between runs, so credentials from the first successful
# issuance remain available for cron-based renewals.
- name: "Molecule | Verify | Warn: INWX credential check skipped (dns-persist active)"
  ansible.builtin.debug:
    msg: >-
      Skipping SAVED_INWX_User/Password assertion: dns-persist-01 account key
      pre-seeding is active (TEST_ACMESH_ACCOUNT_KEY is set) as the pre-seeded
      key shares the letsencrypt_test CA with dns-01 certificates
  when:
    - (lookup('env', 'TEST_ACMESH_INWX_User') | ansible.builtin.length) > 0
    - (lookup('env', 'TEST_ACMESH_ACCOUNT_KEY') | ansible.builtin.length) > 0


- name: "Molecule | Verify | Assert account.conf contains expected INWX credentials"
  ansible.builtin.assert:
    that:
      - __testing_acmesh_account_conf_decoded is search("SAVED_INWX_User='" ~ lookup('env', 'TEST_ACMESH_INWX_User') ~ "'")
      - __testing_acmesh_account_conf_decoded is search("SAVED_INWX_Password='" ~ lookup('env', 'TEST_ACMESH_INWX_Password') ~ "'")
    fail_msg: "account.conf does not contain the expected SAVED_INWX_User/Password values."
    success_msg: "account.conf contains the expected INWX credentials."
  vars:
    __testing_acmesh_account_conf_decoded: "{{ __testing_acmesh_account_conf_content['content'] | ansible.builtin.b64decode }}"
  when:
    - __testing_missing_envvars_dns01 is not ansible.builtin.defined or
      ((__testing_missing_envvars_dns01 | ansible.builtin.length) <= 0)
    - (lookup('env', 'TEST_ACMESH_INWX_User') | ansible.builtin.length) > 0
    - (lookup('env', 'TEST_ACMESH_ACCOUNT_KEY') | ansible.builtin.length) <= 0
    - __testing_acmesh_account_conf_stat['stat']['exists']
    - __testing_acmesh_account_conf_content is ansible.builtin.defined


## Test feature: Update reloadcmd and hooks of test domain config

- name: "Molecule | Verify | Permissions of test domain certificates (dns-01 challenge)"
  when:
    - __testing_missing_envvars_dns01 is not ansible.builtin.defined or
      ((__testing_missing_envvars_dns01 | ansible.builtin.length) <= 0)
    - (lookup('env', 'TEST_ACMESH_TESTDOMAIN2') | ansible.builtin.length) > 0
  block:

    - name: "Molecule | Verify | Flush handlers now"
      ansible.builtin.meta: "flush_handlers"


    - name: "Molecule | Verify | Adapt second domain certificate config: Update reloadcmd and hooks"
      ansible.builtin.include_role:
        name: "foundata.acmesh.run"
      vars:
        run_acmesh_state: "present"
        run_acmesh_cfg_accountemail: "{{ lookup('env', 'TEST_ACMESH_ACCOUNTEMAIL') }}"
        run_acmesh_certs:
          # The following parameters are all copied from the call in converge/run-role.yml execpt:
          # - reloadcmd
          # - pre_hook
          # - post_hook
          # - renew_hook
          - domains:
              - name: "{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}"
                challenge:
                  type: "dns"
                  dns_provider: "dns_inwx"
                  challenge_alias: "{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2_CHALLENGE_ALIAS') }}"
              - name: "www.{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}"
                challenge:
                  type: "dns"
                  dns_provider: "dns_inwx"
                  challenge_alias: "www.{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}.{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2_CHALLENGE_ALIAS') }}"
            install:
              ca_file: "/etc/pki/tls/certs/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}/ca.cer"
              cert_file: "/etc/pki/tls/certs/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}/cert.cer"
              fullchain_file: "/etc/pki/tls/certs/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}/fullchain.cer"
              key_file: "/etc/pki/tls/certs/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}/cert.key"
              reloadcmd: "true reload_update"
            # "{letsencrypt,buypass,google}_test" for staging, see
            # https://github.com/acmesh-official/acme.sh/wiki/Server
            server: "letsencrypt_test"
            force: false # optional
            debug: false # optional
            pre_hook: "true pre_update" # changed value
            post_hook: "true post_update" # changed value
            renew_hook: "true renew_update" # changed value
            extra_flags: "" # optional (workaround for edge cases, put --whatever here)
        # Environment variables needed for the DNS API authentication for
        # type: "dns" and dns_provider: "dns_inwx"
        run_acmesh_environment:
          INWX_User: "{{ lookup('env', 'TEST_ACMESH_INWX_User') }}"
          INWX_Password: "{{ lookup('env', 'TEST_ACMESH_INWX_Password') }}"

    - name: "Molecule | Verify | Read certificate config file content again (dns-01 challenge, second test domain)"
      ansible.builtin.slurp:
        src: "{{ run_acmesh_cfg_cert_home }}/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}_ecc/{{ lookup('env', 'TEST_ACMESH_TESTDOMAIN2') }}.conf"
      register: __testing_acmesh_domaincfg_content_domain2
      when:
        - __testing_acmesh_domaincfg_stat_domain2 is ansible.builtin.defined
        - __testing_acmesh_domaincfg_stat_domain2['stat']['exists']

    - name: "Molecule | Verify | Display certificate config file content (dns-01 challenge, second test domain)"
      ansible.builtin.debug:
        msg: "{{ __testing_acmesh_domaincfg_content_domain2_decoded.split('\n') }}"
        verbosity: 1
      vars:
        __testing_acmesh_domaincfg_content_domain2_decoded: "{{ __testing_acmesh_domaincfg_content_domain2['content'] | ansible.builtin.b64decode }}"
      when:
        - __testing_acmesh_domaincfg_stat_domain2 is ansible.builtin.defined
        - __testing_acmesh_domaincfg_stat_domain2['stat']['exists']
        - __testing_acmesh_domaincfg_content_domain2 is ansible.builtin.defined


    - name: "Molecule | Verify | Verify updated reloadcmd and hook values in certificate config file (dns-01 challenge, second test domain)"
      ansible.builtin.assert:
        that:
          - __testing_acmesh_domaincfg_content_domain2_decoded is search("Le_PreHook='__ACME_BASE64__START_dHJ1ZSBwcmVfdXBkYXRl__ACME_BASE64__END_'")
          - __testing_acmesh_domaincfg_content_domain2_decoded is search("Le_PostHook='__ACME_BASE64__START_dHJ1ZSBwb3N0X3VwZGF0ZQ==__ACME_BASE64__END_'")
          - __testing_acmesh_domaincfg_content_domain2_decoded is search("Le_RenewHook='__ACME_BASE64__START_dHJ1ZSByZW5ld191cGRhdGU=__ACME_BASE64__END_'")
          - __testing_acmesh_domaincfg_content_domain2_decoded is search("Le_ReloadCmd='__ACME_BASE64__START_dHJ1ZSByZWxvYWRfdXBkYXRl__ACME_BASE64__END_'")
        fail_msg: "The certificate config file does not contain the expected, updated reloadcmd and hook values."
        success_msg: "All updated reloadcmd and hook values have been found in the certificate config file."
      vars:
        __testing_acmesh_domaincfg_content_domain2_decoded: "{{ __testing_acmesh_domaincfg_content_domain2['content'] | ansible.builtin.b64decode }}"
      when:
        - __testing_acmesh_domaincfg_stat_domain2 is ansible.builtin.defined
        - __testing_acmesh_domaincfg_stat_domain2['stat']['exists']
        - __testing_acmesh_domaincfg_content_domain2 is ansible.builtin.defined


