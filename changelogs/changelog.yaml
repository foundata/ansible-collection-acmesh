  2.0.1:
    changes:
      minor_changes:
        - '``foundata.acmesh.run`` - Handle deprecated ``fullcain_file`` alias gracefully.
          The deprecated ``run_acmesh_certs[][''install''][''fullcain_file'']`` typo
          alias now emits a timed warning instead of failing immediately, then normalizes
          the value to ``fullchain_file`` and removes the deprecated key before later
          tasks run.

          '
      release_summary: 'Release Date: 2026-06-01


