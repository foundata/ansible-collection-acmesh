- name: "Molecule | Verify | Permissions of test domain certificates (dns-01 challenge)"
  when:
    - __testing_missing_envvars_dns01 is not ansible.builtin.defined or
      ((__testing_missing_envvars_dns01 | ansible.builtin.length) <= 0)
    - ((lookup('env', 'TEST_ACMESH_TESTDOMAIN1') | ansible.builtin.length) > 0) or
      ((lookup('env', 'TEST_ACMESH_TESTDOMAIN2') | ansible.builtin.length) > 0)
  block:

    - name: "Molecule | Verify | Build list of installed certificate files (dns-01 challenge)"
      ansible.builtin.set_fact:
        __testing_acmesh_cert_files_installed: |
          {%- set _files = [] -%}

          {%- set _d1 = lookup('env', 'TEST_ACMESH_TESTDOMAIN1') -%}
          {%- if _d1 | ansible.builtin.length > 0 -%}
            {%- for _fname in ['ca.cer', 'cert.cer', 'fullchain.cer', 'cert.key'] -%}
              {%- set _ = _files.append('/etc/pki/tls/certs/' ~ _d1 ~ '/' ~ _fname) -%}
            {%- endfor -%}
          {%- endif -%}

          {%- set _d2 = lookup('env', 'TEST_ACMESH_TESTDOMAIN2') -%}
          {%- if _d2 | ansible.builtin.length > 0 -%}
            {%- for _fname in ['ca.cer', 'cert.cer', 'fullchain.cer', 'cert.key'] -%}
              {%- set _ = _files.append('/etc/pki/tls/certs/' ~ _d2 ~ '/' ~ _fname) -%}
            {%- endfor -%}
          {%- endif -%}

          {{ _files }}


    - name: "Molecule | Verify | Gather stats for installed certificate files (dns-01 challenge)"
      ansible.builtin.stat:
        path: "{{ item }}"
        get_checksum: false
        get_mime: false
      loop: "{{ __testing_acmesh_cert_files_installed | ansible.builtin.default([]) }}"
      register: __testing_acmesh_cert_files_installed_stat


    - name: "Molecule | Verify | Check existence, permissions and ownership: installed certificate files (dns-01 challenge)"
      ansible.builtin.assert:
        that:
          - item['stat']['exists']
          - item['stat']['isreg']
          - item['stat']['mode'] == '0640'
          - item['stat']['pw_name'] == run_acmesh_user
          - item['stat']['gr_name'] == run_acmesh_group
        fail_msg: "{{ item['stat']['path'] }} does not exist or has incorrect permissions/ownership"
      loop: "{{ __testing_acmesh_cert_files_installed_stat['results'] | ansible.builtin.default([]) }}"
      loop_control:
        label: "{{ item['stat']['path'] | ansible.builtin.default('undefined') }}"
      when:
        - __testing_acmesh_cert_files_installed_stat is ansible.builtin.defined
        - __testing_acmesh_cert_files_installed_stat['results'] is ansible.builtin.defined
        - __testing_acmesh_cert_files_installed_stat['results'] | ansible.builtin.length > 0


## Files and directories: webroot (pebble) certificate

- name: "Molecule | Verify | Certificates (webroot challenge)"
  when:
    - __testing_state['__testing_pebble_available'] | ansible.builtin.default(false)
  block:

    - name: "Molecule | Verify | Gather stats for directory: certificate data dir (webroot challenge)"
      ansible.builtin.stat:
        path: "{{ run_acmesh_cfg_cert_home }}/acmesh-webroot.test_ecc/"
        get_checksum: false
        get_mime: false
      register: __testing_acmesh_webroot_certdir_stat


    - name: "Molecule | Verify | Check existence, permissions and ownership: certificate data dir (webroot challenge)"
      ansible.builtin.assert:
        that:
          - __testing_acmesh_webroot_certdir_stat['stat']['exists']
          - __testing_acmesh_webroot_certdir_stat['stat']['isdir']
          - __testing_acmesh_webroot_certdir_stat['stat']['mode'] == '2750'
          - __testing_acmesh_webroot_certdir_stat['stat']['pw_name'] == run_acmesh_user
          - __testing_acmesh_webroot_certdir_stat['stat']['gr_name'] == run_acmesh_group
        fail_msg: "{{ run_acmesh_cfg_cert_home }}/acmesh-webroot.test_ecc/ does not exist or has incorrect permissions/ownership"


    - name: "Molecule | Verify | Gather stats for installed certificate files (webroot challenge)"
      ansible.builtin.stat:
        path: "{{ item }}"
        get_checksum: false
        get_mime: false
      loop:
        - "/etc/pki/tls/certs/acmesh-webroot.test/ca.cer"
        - "/etc/pki/tls/certs/acmesh-webroot.test/cert.cer"
        - "/etc/pki/tls/certs/acmesh-webroot.test/fullchain.cer"
        - "/etc/pki/tls/certs/acmesh-webroot.test/cert.key"
      register: __testing_acmesh_webroot_cert_files_stat


    - name: "Molecule | Verify | Check existence, permissions and ownership: installed certificate files (webroot challenge)"
      ansible.builtin.assert:
        that:
          - item['stat']['exists']
          - item['stat']['isreg']
          - item['stat']['mode'] == '0640'
          - item['stat']['pw_name'] == run_acmesh_user
          - item['stat']['gr_name'] == run_acmesh_group
        fail_msg: "{{ item['stat']['path'] }} does not exist or has incorrect permissions/ownership"
      loop: "{{ __testing_acmesh_webroot_cert_files_stat['results'] | ansible.builtin.default([]) }}"
      loop_control:
        label: "{{ item['stat']['path'] | ansible.builtin.default('undefined') }}"
      when:
        - __testing_acmesh_webroot_cert_files_stat['results'] is ansible.builtin.defined
        - __testing_acmesh_webroot_cert_files_stat['results'] | ansible.builtin.length > 0


    - name: "Molecule | Verify | Read certificate SAN (Subject Alternative Name) (webroot challenge)"
      ansible.builtin.command:
        argv:
          - "openssl"
          - "x509"
          - "-in"
          - "/etc/pki/tls/certs/acmesh-webroot.test/cert.cer"
          - "-noout"
          - "-ext"
          - "subjectAltName"
      changed_when: false
      register: __testing_acmesh_webroot_cert_san


    - name: "Molecule | Verify | Assert certificate SAN contains expected domain (webroot challenge)"
      ansible.builtin.assert:
        that:
          - "'acmesh-webroot.test' in __testing_acmesh_webroot_cert_san['stdout']"
        fail_msg: >-
          Webroot certificate SAN does not contain 'acmesh-webroot.test'.
          Got: {{ __testing_acmesh_webroot_cert_san['stdout'] }}
        success_msg: "Webroot certificate SAN matches: {{ __testing_acmesh_webroot_cert_san['stdout'] }}"
      when:
        - __testing_acmesh_webroot_cert_san is ansible.builtin.defined


