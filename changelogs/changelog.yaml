    release_date: '2026-06-01'
  2.0.0:
    changes:
      breaking_changes:
        - '``foundata.acmesh.run`` - Renamed the ``run_acmesh_certs[][''install'']\``
          sub-key ``fullcain_file`` to ``fullchain_file`` (typo fix, "cain" instead
          of "chain"). Update your playbooks and inventory accordingly by replacing
          all occurrences of ``fullcain_file`` with ``fullchain_file``.

          '
      major_changes:
        - '``foundata.acmesh.run`` - Added support for the ``dns-persist-01`` ACME
          challenge type (https://github.com/foundata/ansible-collection-acmesh/issues/17).
          This challenge uses a static TXT record at ``_validation-persist.<domain>``
          bound to the ACME account key, eliminating the need for DNS API credentials
          during certificate issuance and renewal. New challenge sub-options: ``dns_persist_wildcard``,
          ``dns_persist_ca_name``, and ``dns_persist_days``. New parameters: ``run_acmesh_cfg_account_keys``,
          and ``run_acmesh_dns_persist_pause``. The ACME registration metadata (account.json)
          may get automatically regenerated by ``acme.sh --register-account`` using
          the seeded account key (per RFC 8555 7.3.1, the CA identifies accounts by
          their public key) if needed. Please note that you might need to set ``run_acmesh_git_version:
          "master"`` since acme.sh 3.1.4 is not yet released as of 2026-05-21 and
          earlier versions lack support for ``dns-persist-01``.

          '
        - '``foundata.acmesh.run`` - The role now automatically registers ACME accounts,
          generates dns-persist TXT record values via ``acme.sh --make-dns-persist-value``,
          and displays human-readable instructions for DNS record publication when
          certificates use the ``dns_persist`` challenge type.

          '
      minor_changes:
        - "``foundata.acmesh.run`` - Added ``run_acmesh_cfg_ca_bundle`` and ``run_acmesh_cfg_ca_path``\
          \ parameters to specify a custom CA certificate bundle or directory for\
          \ all acme.sh HTTPS requests (issue, register-account). This is needed when\
          \ the ACME server uses a non-standard CA. These are global acme.sh settings,\
          \ matching the upstream behavior where ``CA_BUNDLE`` / ``CA_PATH`` are persisted\
          \ to ``account.conf``. Until now, one had to use ``run_acmesh_certs['extra_flags']``\
          \ for this. As these settings are quite common,\trole level variables make\
          \ sense.\n"
        - '``foundata.acmesh.run`` - Added ``run_acmesh_git_version`` parameter to
          override the automatically detected acme.sh version with a specific Git
          ref (tag, branch, or commit hash). Setting it to ``master`` installs the
          latest code, which is usually safe as acme.sh aims for a production-ready
          ``master`` branch by default. This may be needed for features not yet included
          in a tagged release (example as of 2026-05-19: ``--make-dns-persist-value``
          for dns-persist-01 support which is in `master` but not in the latest tagged
          version 3.1.3) or when you want to pin a specific version for reproducibility.

          '
      release_summary: 'Release Date: 2026-05-21


        Feature and bugfix release.

        '
    fragments:
