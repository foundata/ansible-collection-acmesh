          - item['stat']['isreg']
          - item['stat']['mode'] == '0600'
          - item['stat']['pw_name'] == run_acmesh_user
          - item['stat']['gr_name'] == run_acmesh_group
        fail_msg: "{{ item['stat']['path'] }} has incorrect permissions (expected 0600, {{ run_acmesh_user }}:{{ run_acmesh_group }})"
        success_msg: "{{ item['stat']['path'] }} has correct permissions (0600, {{ run_acmesh_user }}:{{ run_acmesh_group }})"
      loop: "{{ __testing_acmesh_account_key_files_stat['results'] | ansible.builtin.default([]) }}"
      loop_control:
        label: "{{ item['stat']['path'] | ansible.builtin.default('undefined') }}"
      when:
        - __testing_acmesh_account_key_files_stat is ansible.builtin.defined
        - __testing_acmesh_account_key_files_stat['results'] is ansible.builtin.defined
        - __testing_acmesh_account_key_files_stat['results'] | ansible.builtin.length > 0


