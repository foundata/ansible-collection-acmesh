# Check collection role "run" outcomes.

- name: "Molecule | Verify | Initialize the foundata.acmesh.run role (without actually running it; get and expose variables)"
  ansible.builtin.include_role:
    name: "foundata.acmesh.run"
    tasks_from: "init"
    public: true


## Preparation

- name: "Molecule | Verify | Set run_acmesh_* parameters as facts from __testing_state"
  ansible.builtin.set_fact:
    "{{ item['key'] }}": "{{ item['value'] }}"
  loop: >-
    {{
      (__testing_state | default({}, true))
      | ansible.builtin.dict2items
      | ansible.builtin.selectattr('key', 'match', '^run_acmesh_')
      | ansible.builtin.list
    }}


- name: "Molecule | Verify | Set other __testing_* variables as facts from __testing_state"
  ansible.builtin.set_fact:
    "{{ item['key'] }}": "{{ item['value'] }}"
  loop: >-
    {{
      (__testing_state | default({}, true))
      | ansible.builtin.dict2items
      | ansible.builtin.selectattr('key', 'match', '^__testing_')
      | ansible.builtin.list
    }}


## Files and directories

- name: "Molecule | Verify | Gather stats for directory: {{ run_acmesh_cfg_home }}"
  ansible.builtin.stat:
    path: "{{ run_acmesh_cfg_home }}"
    get_checksum: false
    get_mime: false
  register: __testing_run_acmesh_cfg_home_stat


- name: >-
    Molecule | Verify | Check existence, permissions and ownership:
    {{ run_acmesh_cfg_home }},
    {{ run_acmesh_user }}:{{ run_acmesh_group }},
    0750 (u=rwx,g=rx,o=)
  # noqa: name[template]
  ansible.builtin.assert:
    that:
      - __testing_run_acmesh_cfg_home_stat['stat']['exists']
      - __testing_run_acmesh_cfg_home_stat['stat']['isdir']
      - __testing_run_acmesh_cfg_home_stat['stat']['mode'] == '0750'
      - __testing_run_acmesh_cfg_home_stat['stat']['pw_name'] == run_acmesh_user
      - __testing_run_acmesh_cfg_home_stat['stat']['gr_name'] == run_acmesh_group
    fail_msg: "{{ run_acmesh_cfg_home }} does not exist or has incorrect permissions/ownership"


