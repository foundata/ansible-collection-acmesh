# Uninstall: Manage basic resource removal, such as packages or service users.

---

- name: "Setup | Uninstall | Default | Call uninstall action of acme.sh"
  # The command or shell module is used here. This approach is justified:
  #
  # - No built-in Ansible module provides a direct way to interact with the
  #   used command.
  # - Inline templating allows for safe and efficient parameter handling,
  #   avoiding the need for multiple additional tasks with little to no benefit.
  #
  # Notes on the command or script itself:
  #
  # See the official documentation for a explanation of the parameters:
  # https://github.com/acmesh-official/acme.sh/wiki/Options-and-Params
  ansible.builtin.command:
    cmd: >
      {{ (run_acmesh_cfg_home ~ '/acme.sh') | ansible.builtin.quote }}
        --uninstall
        --config-home {{ run_acmesh_cfg_config_home | ansible.builtin.quote }}
  args:
    removes: "{{ run_acmesh_cfg_home }}/acme.sh"
  when:
    - __run_acmesh_is_installed


- name: "Setup | Uninstall | Default | Remove packages"
  ansible.builtin.package:
    name: "{{ __run_acmesh_packages_uninstall }}"
    state: "absent"
  when:
    - __run_acmesh_packages_uninstall is ansible.builtin.defined
    - (__run_acmesh_packages_uninstall | ansible.builtin.length) > 0


- name: "Setup | Uninstall | Default | Delete service user"
  ansible.builtin.user:
    name: "{{ run_acmesh_user }}"
    state: "absent"
    force: true
    remove: true # attempts to remove directories associated with the user (e.g. home)


- name: "Setup | Uninstall | Default | Delete service user's primary group"
  ansible.builtin.group:
    name: "{{ run_acmesh_user }}" # username == primary group name
    state: "absent"
    force: true


# The service user's supplementary group (run_acmesh_group) may differ from the
# primary group (which shares the username). The following tasks query the group,
# filter out the just-deleted service user (userdel does not clean supplementary
# entries in /etc/group), and delete the group only if no other members remain.
- name: "Setup | Uninstall | Default | Query group information: {{ run_acmesh_group }}"
  ansible.builtin.getent:
    database: "group"
    key: "{{ run_acmesh_group }}"
    fail_key: false
  when:
    - run_acmesh_group != run_acmesh_user


- name: "Setup | Uninstall | Default | Determine remaining members of group: {{ run_acmesh_group }}"
  ansible.builtin.set_fact:
    __run_acmesh_group_remaining_members: >-
      {{
        ansible_facts['getent_group'][run_acmesh_group][2]
        | ansible.builtin.default('', true)
        | ansible.builtin.split(',')
        | ansible.builtin.reject('equalto', run_acmesh_user)
        | ansible.builtin.reject('equalto', '')
        | ansible.builtin.list
      }}
  when:
    - run_acmesh_group != run_acmesh_user
    - ansible_facts['getent_group'] is ansible.builtin.defined
    - ansible_facts['getent_group'][run_acmesh_group] is not none


- name: "Setup | Uninstall | Default | Delete group if no other members: {{ run_acmesh_group }}"
  ansible.builtin.group:
    name: "{{ run_acmesh_group }}"
    state: "absent"
  when:
    - run_acmesh_group != run_acmesh_user
    - __run_acmesh_group_remaining_members is ansible.builtin.defined
    - (__run_acmesh_group_remaining_members | ansible.builtin.length) == 0


- name: "Setup | Uninstall | Disable acmesh-renewal.timer (best-effort)"
  ansible.builtin.systemd_service:
    name: "acmesh-renewal.timer"
    enabled: false
  failed_when:
    - false
  notify:
    - "run_acmesh: systemd daemon-reload"


- name: "Setup | Uninstall | Default | Delete files and directories (except certificates)"
  ansible.builtin.file:
    path: "{{ item }}"
    state: "absent"
  loop:
    - "{{ run_acmesh_cfg_home }}"
    - "{{ run_acmesh_cfg_config_home }}"
    - "{{ run_acmesh_cfg_logfile }}"
    - "{{ __run_acmesh_profiled_envfile_path }}"
    - "{{ __run_acmesh_systemd_renewal_servicefile_path }}"
    - "{{ __run_acmesh_systemd_renewal_timerfile_path }}"
  notify:
    - "run_acmesh: systemd daemon-reload"
