---

major_changes:
  - >
    ``foundata.acmesh.run`` - Added ``run_acmesh_git_version`` parameter to
    override the automatically detected acme.sh version with a specific Git ref
    (tag, branch, or commit hash). Setting it to ``master`` installs the latest
    code, which is usually safe as acme.sh aims for a production-ready ``master``
    branch by default. This may be needed for features not yet included in a
    tagged release (example as of 2026-05-19: ``--make-dns-persist-value`` for
    dns-persist-01 support which is in `master` but not in the latest tagged
    version 3.1.3) or when you want to pin a specific version for reproducibility.
